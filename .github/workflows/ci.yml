name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn verify
        working-directory: backend
        run: ./mvnw -B verify

      - name: Build backend Docker image
        run: docker build -t plane-backend:${{ github.sha }} ./backend

      # No registry configured yet — uncomment and add credentials/secrets to push:
      # - name: Push image
      #   run: docker push plane-backend:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Type-check + build
        working-directory: frontend
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t plane-frontend:${{ github.sha }} ./frontend
