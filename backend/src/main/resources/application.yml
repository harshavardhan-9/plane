spring:
  application:
    name: plane-backend
  datasource:
    url: jdbc:postgresql://localhost:5433/plane_db
    username: plane
    password: plane123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8080

jwt:
  secret: your-256-bit-secret-key-here-change-in-production-please
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.plane: DEBUG